name: Build TWRP Recovery

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'TWRP Manifest URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git'
      MANIFEST_BRANCH:
        description: 'Manifest Branch'
        required: true
        default: 'twrp-12.1'
      DEVICE_TREE_URL:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/laozhang-niubi/TWRP_device_PD2231'
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'master'
      DEVICE_PATH:
        description: 'Device Path'
        required: true
        default: 'device/vivo/PD2231'
      DEVICE_NAME:
        description: 'Device Codename'
        required: true
        default: 'PD2231'
      MAKEFILE_NAME:
        description: 'Makefile Name'
        required: true
        default: 'omni_PD2231'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: Display Run Parameters
      run: |
        echo "::group::Build Parameters"
        echo "Manifest: ${{ github.event.inputs.MANIFEST_URL }} @ ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Tree: ${{ github.event.inputs.DEVICE_TREE_URL }} @ ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
        echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
        echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
        echo "Makefile: ${{ github.event.inputs.MAKEFILE_NAME }}"
        echo "Target: ${{ github.event.inputs.BUILD_TARGET }}"
        echo "::endgroup::"

    - name: Check Out
      uses: actions/checkout@v4

    - name: Cleanup Workspace
      uses: rokibhasansagar/slimhub_actions@main

    - name: Install Build Dependencies
      run: |
        sudo apt update && sudo apt upgrade -y
        DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
            libc6-dev lib32ncurses-dev x11proto-core-dev libx11-dev tree lib32z-dev \
            libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libgtk-3-dev \
            libglu1-mesa-dev freeglut3-dev git libxml2 lzop pngcrush schedtool \
            squashfs-tools imagemagick libbz2-dev lzma ncftp qemu-user-static \
            libstdc++-10-dev libncurses6 python3 python3-pip tar

    - name: Install OpenJDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Install Repo
      run: |
        mkdir -p ~/bin
        curl -sL https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Repo
      run: |
        mkdir workspace
        cd workspace
        echo "workspace=$(pwd)" >> $GITHUB_OUTPUT
        git config --global user.name "laozhang-niubi"
        git config --global user.email "2182755817@qq.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
      id: ws

    - name: Repo Sync
      run: repo sync -j$(nproc --all) --force-sync
      working-directory: ${{ steps.ws.outputs.workspace }}

    - name: Clone Device Tree
      run: |
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
      working-directory: ${{ steps.ws.outputs.workspace }}

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Build Recovery
      run: |
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng && make clean && make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
      working-directory: ${{ steps.ws.outputs.workspace }}

    - name: Upload Recovery Image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-${{ github.event.inputs.DEVICE_NAME }}
        path: |
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.zip